<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mother of All Dashboards</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #dde3ef;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .page-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #444;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: 0.01em;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 4px;
      justify-content: center;
      max-width: 1200px;
      padding: 40px 32px;
    }

    /* ── Shortcut card ── */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 11px;
      cursor: pointer;
      text-decoration: none;
      width: 112px;
      padding: 12px 6px;
      border-radius: 12px;
      transition: background 0.15s ease;
    }

    .card:hover {
      background: rgba(255,255,255,0.35);
    }

    /* Outer ring = same as page bg, creates the halo effect */
    .icon-outer {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #dde3ef;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 0 0 transparent;
      flex-shrink: 0;
    }

    .icon-inner {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      transition: box-shadow 0.15s ease, transform 0.15s ease;
      user-select: none;
    }

    .card:hover .icon-inner {
      box-shadow: 0 5px 16px rgba(0,0,0,0.24);
      transform: scale(1.04);
    }

    .label {
      font-size: 0.8rem;
      color: #444;
      text-align: center;
      line-height: 1.35;
      max-width: 100px;
      font-weight: 500;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* ── Add shortcut card ── */
    .add-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 11px;
      cursor: pointer;
      width: 112px;
      padding: 12px 6px;
      border-radius: 12px;
      transition: background 0.15s ease;
    }

    .add-card:hover {
      background: rgba(255,255,255,0.35);
    }

    .add-outer {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #dde3ef;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .add-inner {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: #777;
      background: rgba(255,255,255,0.55);
      border: none;
      transition: background 0.15s, color 0.15s, transform 0.15s;
    }

    .add-card:hover .add-inner {
      background: rgba(255,255,255,0.75);
      color: #444;
      transform: scale(1.04);
    }

    .add-label {
      font-size: 0.8rem;
      color: #777;
      text-align: center;
      font-weight: 500;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.28);
      backdrop-filter: blur(5px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 20px;
      padding: 32px;
      width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.22);
      animation: pop 0.18s ease;
    }

    @keyframes pop {
      from { transform: scale(0.93); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .modal h2 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 24px;
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 0.73rem;
      font-weight: 600;
      color: #888;
      margin-bottom: 6px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .field input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e8e8e8;
      border-radius: 10px;
      font-size: 0.92rem;
      color: #222;
      outline: none;
      transition: border-color 0.15s;
      background: #fafafa;
    }

    .field input:focus { border-color: #5a7bfa; background: white; }

    .color-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }

    .color-swatch {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform 0.12s, border-color 0.12s;
      outline: 2px solid transparent;
    }

    .color-swatch:hover { transform: scale(1.18); }

    .color-swatch.selected {
      border-color: white;
      outline-color: #333;
      transform: scale(1.15);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 26px;
    }

    .btn {
      padding: 10px 24px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-cancel { background: #f0f0f0; color: #555; }
    .btn-cancel:hover { background: #e6e6e6; }
    .btn-save { background: #4f6ef7; color: white; }
    .btn-save:hover { background: #3a5ce0; }

    /* ── Context menu ── */
    .ctx-menu {
      display: none;
      position: fixed;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      padding: 6px 0;
      z-index: 200;
      min-width: 150px;
    }

    .ctx-menu.open { display: block; }

    .ctx-item {
      padding: 10px 18px;
      font-size: 0.86rem;
      color: #333;
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ctx-item:hover { background: #f4f4f4; }
    .ctx-item.danger { color: #d93535; }
    .ctx-item.danger:hover { background: #fff2f2; }
  </style>
</head>
<body>

<h1 class="page-title">Mother of All Dashboards</h1>
<div class="grid" id="grid"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add shortcut</h2>
    <div class="field">
      <label>Name</label>
      <input type="text" id="inputName" placeholder="e.g. Sales Dashboard">
    </div>
    <div class="field">
      <label>URL</label>
      <input type="text" id="inputUrl" placeholder="https://...">
    </div>
    <div class="field">
      <label>Icon (1–2 letters or emoji)</label>
      <input type="text" id="inputIcon" maxlength="2" placeholder="e.g. S or 📊">
    </div>
    <div class="field">
      <label>Color</label>
      <div class="color-row" id="colorRow"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-save" onclick="saveEntry()">Save</button>
    </div>
  </div>
</div>

<!-- Context menu -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" onclick="ctxEdit()">✏️ Edit</div>
  <div class="ctx-item" onclick="ctxOpen()">↗️ Open in new tab</div>
  <div class="ctx-item danger" onclick="ctxDelete()">🗑️ Remove</div>
</div>

<script>
  const COLORS = [
    '#e74c6f','#e8703a','#d4a017','#27ae7a','#2196c8',
    '#4f6ef7','#8e5ff5','#c05fa3','#5a7a8a','#2d6a2d'
  ];

  const DEFAULTS = [
    { id: 1, name: 'Workout Calendar',   url: '#', icon: 'W', color: '#c05fa3' },
    { id: 2, name: 'Habit Dashboard',    url: '#', icon: 'H', color: '#27ae7a' },
    { id: 3, name: 'Sales Dashboard',    url: '#', icon: 'S', color: '#e74c6f' },
    { id: 4, name: 'Subscription Mgmt',  url: '#', icon: '🔖', color: '#e8703a' },
    { id: 5, name: 'End to End',         url: '#', icon: '+', color: '#27ae7a' },
    { id: 6, name: 'Workout Planner',    url: '#', icon: 'A', color: '#4f6ef7' },
    { id: 7, name: 'Route',              url: '#', icon: 'R', color: '#8e5ff5' },
    { id: 8, name: 'Ferra Data Analyst', url: '#', icon: 'R', color: '#2d6a2d' },
  ];

  let entries = JSON.parse(localStorage.getItem('dashboards') || 'null') || DEFAULTS;
  let editingId = null;
  let ctxTargetId = null;
  let selectedColor = COLORS[0];

  function save() { localStorage.setItem('dashboards', JSON.stringify(entries)); }
  function nextId() { return entries.length ? Math.max(...entries.map(e => e.id)) + 1 : 1; }

  function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    entries.forEach(e => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = e.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.dataset.id = e.id;
      a.addEventListener('contextmenu', onCtxMenu);
      a.innerHTML = `
        <div class="icon-outer">
          <div class="icon-inner" style="background:${e.color};">${e.icon}</div>
        </div>
        <span class="label">${e.name}</span>
      `;
      grid.appendChild(a);
    });

    const add = document.createElement('div');
    add.className = 'add-card';
    add.onclick = () => openModal();
    add.innerHTML = `
      <div class="add-outer">
        <div class="add-inner">+</div>
      </div>
      <span class="add-label">Add shortcut</span>
    `;
    grid.appendChild(add);
  }

  function buildColorRow(current) {
    const row = document.getElementById('colorRow');
    row.innerHTML = '';
    COLORS.forEach(c => {
      const s = document.createElement('div');
      s.className = 'color-swatch' + (c === current ? ' selected' : '');
      s.style.background = c;
      s.onclick = () => { selectedColor = c; buildColorRow(c); };
      row.appendChild(s);
    });
  }

  function openModal(id = null) {
    editingId = id;
    const entry = id ? entries.find(e => e.id === id) : null;
    document.getElementById('modalTitle').textContent = id ? 'Edit shortcut' : 'Add shortcut';
    document.getElementById('inputName').value = entry?.name ?? '';
    document.getElementById('inputUrl').value  = entry?.url  ?? '';
    document.getElementById('inputIcon').value = entry?.icon ?? '';
    selectedColor = entry?.color ?? COLORS[Math.floor(Math.random() * COLORS.length)];
    buildColorRow(selectedColor);
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('inputName').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    editingId = null;
  }

  function saveEntry() {
    const name = document.getElementById('inputName').value.trim();
    const url  = document.getElementById('inputUrl').value.trim();
    const icon = document.getElementById('inputIcon').value.trim() || name.slice(0,1).toUpperCase();

    if (!name) { alert('Please enter a name.'); return; }
    if (!url)  { alert('Please enter a URL.');  return; }

    if (editingId) {
      Object.assign(entries.find(e => e.id === editingId), { name, url, icon, color: selectedColor });
    } else {
      entries.push({ id: nextId(), name, url, icon, color: selectedColor });
    }
    save(); closeModal(); renderGrid();
  }

  function onCtxMenu(ev) {
    ev.preventDefault();
    ctxTargetId = +ev.currentTarget.dataset.id;
    const menu = document.getElementById('ctxMenu');
    menu.style.left = ev.clientX + 'px';
    menu.style.top  = ev.clientY + 'px';
    menu.classList.add('open');
  }

  function closeCtx() { document.getElementById('ctxMenu').classList.remove('open'); }
  function ctxEdit()   { closeCtx(); openModal(ctxTargetId); }
  function ctxOpen()   { closeCtx(); const e = entries.find(e => e.id === ctxTargetId); if (e) window.open(e.url, '_blank'); }
  function ctxDelete() {
    closeCtx();
    if (confirm('Remove this shortcut?')) {
      entries = entries.filter(e => e.id !== ctxTargetId);
      save(); renderGrid();
    }
  }

  document.addEventListener('click', closeCtx);
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeCtx(); }
  });

  renderGrid();
</script>
</body>
</html>
