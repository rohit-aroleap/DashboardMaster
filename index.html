<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mother of All Dashboards</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #dde3ef;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
    }

    .page-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #444;
      text-align: center;
      margin-bottom: 4px;
    }

    .page-version {
      font-size: 0.8rem;
      color: #999;
      text-align: center;
      margin-bottom: 32px;
      letter-spacing: 0.05em;
    }

    /* ── Sections ── */
    .section {
      width: 100%;
      max-width: 1100px;
    }

    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: #999;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 6px;
      padding-left: 4px;
    }

    .divider {
      width: 100%;
      max-width: 1100px;
      border: none;
      border-top: 1.5px solid rgba(0,0,0,0.08);
      margin: 8px 0 24px;
    }

    /* ── Grids ── */
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 4px;
      min-height: 116px;
      padding: 10px 6px;
      border-radius: 16px;
      transition: background 0.2s;
    }

    .grid.drop-target {
      background: rgba(79,110,247,0.07);
      outline: 2px dashed rgba(79,110,247,0.35);
    }

    /* Empty favourites drop zone */
    .fav-empty {
      width: 100%;
      min-height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #bbb;
      font-size: 0.82rem;
      border: 2px dashed #ccc;
      border-radius: 14px;
      pointer-events: none;
    }

    /* ── Card ── */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 11px;
      cursor: grab;
      text-decoration: none;
      width: 112px;
      padding: 12px 6px;
      border-radius: 12px;
      transition: background 0.15s, opacity 0.15s, transform 0.15s;
      position: relative;
    }

    .card:hover { background: rgba(255,255,255,0.35); }
    .card.dragging { opacity: 0.3; cursor: grabbing; }
    .card.drag-over { background: rgba(79,110,247,0.13); transform: scale(1.06); }

    .icon-outer {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #dde3ef;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-inner {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      transition: box-shadow 0.15s, transform 0.15s;
      user-select: none;
    }

    .card:hover .icon-inner {
      box-shadow: 0 5px 16px rgba(0,0,0,0.24);
      transform: scale(1.04);
    }

    /* Star badge on favourited cards in the All section */
    .fav-badge {
      position: absolute;
      top: 10px;
      right: 14px;
      font-size: 0.7rem;
      color: #f5a623;
      line-height: 1;
    }

    .label {
      font-size: 0.8rem;
      color: #444;
      text-align: center;
      line-height: 1.35;
      max-width: 100px;
      font-weight: 500;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* ── Add card ── */
    .add-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 11px;
      cursor: pointer;
      width: 112px;
      padding: 12px 6px;
      border-radius: 12px;
      transition: background 0.15s;
    }

    .add-card:hover { background: rgba(255,255,255,0.35); }

    .add-outer {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #dde3ef;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .add-inner {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: #777;
      background: rgba(255,255,255,0.55);
      transition: background 0.15s, color 0.15s, transform 0.15s;
    }

    .add-card:hover .add-inner {
      background: rgba(255,255,255,0.75);
      color: #444;
      transform: scale(1.04);
    }

    .add-label {
      font-size: 0.8rem;
      color: #777;
      text-align: center;
      font-weight: 500;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.28);
      backdrop-filter: blur(5px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 20px;
      padding: 32px;
      width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.22);
      animation: pop 0.18s ease;
    }

    @keyframes pop {
      from { transform: scale(0.93); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .modal h2 { font-size: 1.15rem; font-weight: 700; color: #1a1a1a; margin-bottom: 24px; }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 0.73rem;
      font-weight: 600;
      color: #888;
      margin-bottom: 6px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .field input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e8e8e8;
      border-radius: 10px;
      font-size: 0.92rem;
      color: #222;
      outline: none;
      transition: border-color 0.15s;
      background: #fafafa;
    }

    .field input:focus { border-color: #5a7bfa; background: white; }

    .color-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }

    .color-swatch {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      outline: 2px solid transparent;
      transition: transform 0.12s, border-color 0.12s;
    }

    .color-swatch:hover { transform: scale(1.18); }
    .color-swatch.selected { border-color: white; outline-color: #333; transform: scale(1.15); }

    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 26px; }

    .btn {
      padding: 10px 24px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-cancel { background: #f0f0f0; color: #555; }
    .btn-cancel:hover { background: #e6e6e6; }
    .btn-save { background: #4f6ef7; color: white; }
    .btn-save:hover { background: #3a5ce0; }

    /* ── Context menu ── */
    .ctx-menu {
      display: none;
      position: fixed;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      padding: 6px 0;
      z-index: 200;
      min-width: 170px;
    }

    .ctx-menu.open { display: block; }

    .ctx-item {
      padding: 10px 18px;
      font-size: 0.86rem;
      color: #333;
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ctx-item:hover { background: #f4f4f4; }
    .ctx-item.danger { color: #d93535; }
    .ctx-item.danger:hover { background: #fff2f2; }
    .ctx-divider { border: none; border-top: 1px solid #eee; margin: 4px 0; }
  </style>
</head>
<body>

<h1 class="page-title">Mother of All Dashboards</h1>
<p class="page-version">v 1.006</p>

<!-- Favourites -->
<div class="section">
  <div class="section-label">⭐ Favourites</div>
  <div class="grid" id="favGrid"></div>
</div>

<hr class="divider">

<!-- All Dashboards -->
<div class="section">
  <div class="section-label">All Dashboards</div>
  <div class="grid" id="allGrid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add shortcut</h2>
    <div class="field">
      <label>Name</label>
      <input type="text" id="inputName" placeholder="e.g. Sales Dashboard">
    </div>
    <div class="field">
      <label>URL</label>
      <input type="text" id="inputUrl" placeholder="https://...">
    </div>
    <div class="field">
      <label>Icon (1–2 letters or emoji)</label>
      <input type="text" id="inputIcon" maxlength="2" placeholder="e.g. S or 📊">
    </div>
    <div class="field">
      <label>Color</label>
      <div class="color-row" id="colorRow"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn btn-save" onclick="saveEntry()">Save</button>
    </div>
  </div>
</div>

<!-- Context menu -->
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item" id="ctxFavItem" onclick="ctxToggleFav()">⭐ Add to Favourites</div>
  <hr class="ctx-divider">
  <div class="ctx-item" onclick="ctxEdit()">✏️ Edit</div>
  <div class="ctx-item" onclick="ctxOpen()">↗️ Open in new tab</div>
  <div class="ctx-item danger" onclick="ctxDelete()">🗑️ Remove</div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDsKcndrK7RLA1btM0JzdQJ6ToP_byqBSw",
    authDomain: "motherofdashboard-53d8d.firebaseapp.com",
    databaseURL: "https://motherofdashboard-53d8d-default-rtdb.firebaseio.com",
    projectId: "motherofdashboard-53d8d",
    storageBucket: "motherofdashboard-53d8d.firebasestorage.app",
    messagingSenderId: "416762890791",
    appId: "1:416762890791:web:caef8d7e26c7847862dc02",
    measurementId: "G-RD3Q792CMR"
  };

  const app    = initializeApp(firebaseConfig);
  const db     = getDatabase(app);
  const dbRef  = ref(db, 'shortcuts');
  const favRef = ref(db, 'favourites'); // separate ordered list of fav IDs

  const COLORS = [
    '#e74c6f','#e8703a','#d4a017','#27ae7a','#2196c8',
    '#4f6ef7','#8e5ff5','#c05fa3','#5a7a8a','#2d6a2d'
  ];

  const DEFAULTS = [
    { id: 1, name: 'Workout Calendar',       url: 'https://public-consistency-dashboard.vercel.app/', icon: 'W', color: '#c05fa3' },
    { id: 2, name: 'Habit Dashboard',        url: 'https://ferra-user-activity-dashboard.vercel.app/', icon: 'H', color: '#27ae7a' },
    { id: 3, name: 'Sales Dashboard',        url: 'https://ferra-waitlist.vercel.app/', icon: 'S', color: '#e74c6f' },
    { id: 4, name: 'Subscription Dashboard', url: 'https://ferra-subscription-manager.vercel.app/', icon: '🔖', color: '#e8703a' },
    { id: 5, name: 'End to End',             url: 'https://docs.google.com/spreadsheets/d/1DehqWCCWQ0Lsuz_sHri3yv3gT1ajB87N3Grfo9miBwM/edit?gid=1263811655#gid=1263811655', icon: '+', color: '#27ae7a' },
    { id: 6, name: 'Workout Planner',        url: 'https://aroleap-workout-plan-management.vercel.app/plan/edit/CeX2hGueVTYkhPgk0NDa', icon: 'A', color: '#4f6ef7' },
    { id: 7, name: 'Route',                  url: 'https://rohit-aroleap.github.io/Route-Tracker/', icon: 'R', color: '#8e5ff5' },
    { id: 8, name: 'Ferra Data Analyst',     url: 'https://rohit-aroleap.github.io/ferra-cohort/', icon: 'R', color: '#2d6a2d' },
    { id: 9, name: 'Payment Link',           url: 'https://subscriptions.ferra.club/subscribe.html', icon: 'P', color: '#2196c8' },
  ];

  let entries   = [];   // all shortcuts
  let favIds    = [];   // ordered list of favourite IDs
  let editingId = null;
  let ctxTargetId   = null;
  let selectedColor = COLORS[0];
  let dragSrcId      = null;
  let dragSrcSection = null; // 'fav' | 'all'

  function nextId() { return entries.length ? Math.max(...entries.map(e => e.id)) + 1 : 1; }
  function saveEntries()  { set(dbRef,  entries); }
  function saveFavIds()   { set(favRef, favIds);  }

  /* ── Build a card element ── */
  function makeCard(e, section) {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = e.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.dataset.id = e.id;
    a.dataset.section = section;
    a.draggable = true;

    const isFav = favIds.includes(e.id);
    a.innerHTML = `
      ${section === 'all' && isFav ? '<span class="fav-badge">★</span>' : ''}
      <div class="icon-outer">
        <div class="icon-inner" style="background:${e.color};">${e.icon}</div>
      </div>
      <span class="label">${e.name}</span>
    `;

    a.addEventListener('contextmenu', onCtxMenu);

    a.addEventListener('dragstart', (ev) => {
      dragSrcId      = e.id;
      dragSrcSection = section;
      setTimeout(() => a.classList.add('dragging'), 0);
      ev.dataTransfer.effectAllowed = 'move';
    });
    a.addEventListener('dragend', () => {
      a.classList.remove('dragging');
      document.querySelectorAll('.card, .grid').forEach(el => {
        el.classList.remove('drag-over', 'drop-target');
      });
    });
    a.addEventListener('dragover', (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      if (e.id !== dragSrcId) a.classList.add('drag-over');
    });
    a.addEventListener('dragleave', () => a.classList.remove('drag-over'));
    a.addEventListener('drop', (ev) => {
      ev.preventDefault();
      ev.stopPropagation();
      a.classList.remove('drag-over');
      handleDrop(e.id, section);
    });

    return a;
  }

  /* ── Drop logic ── */
  function handleDrop(targetId, targetSection) {
    if (dragSrcId === null) return;

    if (dragSrcSection === targetSection) {
      // ── Reorder within same section ──
      if (dragSrcId === targetId) return;
      if (targetSection === 'fav') {
        const from = favIds.indexOf(dragSrcId);
        const to   = favIds.indexOf(targetId);
        const reordered = [...favIds];
        reordered.splice(from, 1);
        reordered.splice(to, 0, dragSrcId);
        favIds = reordered;
        saveFavIds();
      } else {
        const from = entries.findIndex(x => x.id === dragSrcId);
        const to   = entries.findIndex(x => x.id === targetId);
        const reordered = [...entries];
        const [moved] = reordered.splice(from, 1);
        reordered.splice(to, 0, moved);
        entries = reordered;
        saveEntries();
      }
    } else {
      // ── Move between sections ──
      if (targetSection === 'fav') {
        // Add to favourites before targetId
        if (!favIds.includes(dragSrcId)) {
          const insertAt = favIds.indexOf(targetId);
          const newFavIds = [...favIds];
          newFavIds.splice(insertAt >= 0 ? insertAt : newFavIds.length, 0, dragSrcId);
          favIds = newFavIds;
          saveFavIds();
        }
      } else {
        // Remove from favourites
        favIds = favIds.filter(id => id !== dragSrcId);
        saveFavIds();
      }
    }
  }

  /* ── Render ── */
  function render() {
    renderFav();
    renderAll();
  }

  function renderFav() {
    const grid = document.getElementById('favGrid');
    grid.innerHTML = '';

    const favEntries = favIds.map(id => entries.find(e => e.id === id)).filter(Boolean);

    if (favEntries.length === 0) {
      grid.innerHTML = '<div class="fav-empty">Drag dashboards here to pin as favourites</div>';
    } else {
      favEntries.forEach(e => grid.appendChild(makeCard(e, 'fav')));
    }

    // Grid-level drop (for dropping onto empty space)
    grid.addEventListener('dragover', (ev) => {
      ev.preventDefault();
      grid.classList.add('drop-target');
    });
    grid.addEventListener('dragleave', (e) => {
      if (!grid.contains(e.relatedTarget)) grid.classList.remove('drop-target');
    });
    grid.addEventListener('drop', (ev) => {
      ev.preventDefault();
      grid.classList.remove('drop-target');
      // Only act if dropped on the grid itself (not a card — cards handle their own drop)
      if (ev.target === grid || ev.target.classList.contains('fav-empty')) {
        if (dragSrcSection === 'all' && !favIds.includes(dragSrcId)) {
          favIds = [...favIds, dragSrcId];
          saveFavIds();
        }
      }
    });
  }

  function renderAll() {
    const grid = document.getElementById('allGrid');
    grid.innerHTML = '';

    entries.forEach(e => grid.appendChild(makeCard(e, 'all')));

    // Add shortcut button
    const add = document.createElement('div');
    add.className = 'add-card';
    add.onclick = () => openModal();
    add.innerHTML = `
      <div class="add-outer"><div class="add-inner">+</div></div>
      <span class="add-label">Add shortcut</span>
    `;
    grid.appendChild(add);

    // Grid-level drop (for dropping back from fav)
    grid.addEventListener('dragover', (ev) => {
      ev.preventDefault();
      grid.classList.add('drop-target');
    });
    grid.addEventListener('dragleave', (e) => {
      if (!grid.contains(e.relatedTarget)) grid.classList.remove('drop-target');
    });
    grid.addEventListener('drop', (ev) => {
      ev.preventDefault();
      grid.classList.remove('drop-target');
      if (ev.target === grid && dragSrcSection === 'fav') {
        favIds = favIds.filter(id => id !== dragSrcId);
        saveFavIds();
      }
    });
  }

  /* ── Firebase listeners ── */
  onValue(dbRef, (snapshot) => {
    entries = snapshot.exists() ? snapshot.val() : [...DEFAULTS];
    if (!snapshot.exists()) saveEntries();
    render();
  });

  onValue(favRef, (snapshot) => {
    favIds = snapshot.exists() ? snapshot.val() : [];
    render();
  });

  /* ── Modal ── */
  function buildColorRow(current) {
    const row = document.getElementById('colorRow');
    row.innerHTML = '';
    COLORS.forEach(c => {
      const s = document.createElement('div');
      s.className = 'color-swatch' + (c === current ? ' selected' : '');
      s.style.background = c;
      s.onclick = () => { selectedColor = c; buildColorRow(c); };
      row.appendChild(s);
    });
  }

  function openModal(id = null) {
    editingId = id;
    const entry = id ? entries.find(e => e.id === id) : null;
    document.getElementById('modalTitle').textContent = id ? 'Edit shortcut' : 'Add shortcut';
    document.getElementById('inputName').value = entry?.name ?? '';
    document.getElementById('inputUrl').value  = entry?.url  ?? '';
    document.getElementById('inputIcon').value = entry?.icon ?? '';
    selectedColor = entry?.color ?? COLORS[Math.floor(Math.random() * COLORS.length)];
    buildColorRow(selectedColor);
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('inputName').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    editingId = null;
  }

  function saveEntry() {
    const name = document.getElementById('inputName').value.trim();
    const url  = document.getElementById('inputUrl').value.trim();
    const icon = document.getElementById('inputIcon').value.trim() || name.slice(0,1).toUpperCase();
    if (!name) { alert('Please enter a name.'); return; }
    if (!url)  { alert('Please enter a URL.');  return; }
    if (editingId) {
      Object.assign(entries.find(e => e.id === editingId), { name, url, icon, color: selectedColor });
    } else {
      entries.push({ id: nextId(), name, url, icon, color: selectedColor });
    }
    saveEntries();
    closeModal();
  }

  /* ── Context menu ── */
  function onCtxMenu(ev) {
    ev.preventDefault();
    ctxTargetId = +ev.currentTarget.dataset.id;
    const isFav = favIds.includes(ctxTargetId);
    document.getElementById('ctxFavItem').textContent = isFav ? '★ Remove from Favourites' : '⭐ Add to Favourites';
    const menu = document.getElementById('ctxMenu');
    menu.style.left = ev.clientX + 'px';
    menu.style.top  = ev.clientY + 'px';
    menu.classList.add('open');
  }

  function closeCtx() { document.getElementById('ctxMenu').classList.remove('open'); }

  function ctxToggleFav() {
    closeCtx();
    if (favIds.includes(ctxTargetId)) {
      favIds = favIds.filter(id => id !== ctxTargetId);
    } else {
      favIds = [...favIds, ctxTargetId];
    }
    saveFavIds();
  }

  function ctxEdit()   { closeCtx(); openModal(ctxTargetId); }
  function ctxOpen()   { closeCtx(); const e = entries.find(e => e.id === ctxTargetId); if (e) window.open(e.url, '_blank'); }
  function ctxDelete() {
    closeCtx();
    if (confirm('Remove this shortcut?')) {
      entries = entries.filter(e => e.id !== ctxTargetId);
      favIds  = favIds.filter(id => id !== ctxTargetId);
      saveEntries();
      saveFavIds();
    }
  }

  document.addEventListener('click', closeCtx);
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeCtx(); }
  });

  window.openModal  = openModal;
  window.closeModal = closeModal;
  window.saveEntry  = saveEntry;
  window.ctxToggleFav = ctxToggleFav;
  window.ctxEdit    = ctxEdit;
  window.ctxOpen    = ctxOpen;
  window.ctxDelete  = ctxDelete;
</script>
</body>
</html>
